<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>IM_AR_UI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        
        /* Карта на весь екран */
        #map-container { position: absolute; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; filter: invert(1) hue-rotate(180deg) brightness(1.5) contrast(1.2); }

        /* AR-елементи поверх карти */
        .hud-element { position: absolute; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; color: #fff; pointer-events: none; }
        
        #top-right { top: 20px; right: 20px; text-align: right; }
        #bottom-left { bottom: 20px; left: 20px; max-width: 300px; }
        
        .alert-tag { display: inline-block; background: #ff0000; padding: 2px 8px; margin: 2px; font-weight: bold; font-size: 12px; }
        .time { font-size: 40px; font-weight: bold; line-height: 1; }
    </style>
</head>
<body>

    <div id="map-container">
        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </div>

    <div class="hud-element" id="top-right">
        <div class="time" id="clock">00:00</div>
        <div style="font-size: 12px; letter-spacing: 2px;">LOCAL_SYSTEM_TIME</div>
    </div>

    <div class="hud-element" id="bottom-left">
        <div style="font-size: 10px; margin-bottom: 10px; letter-spacing: 2px;">ACTIVE_ALERTS_FEED</div>
        <div id="alerts-list"></div>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'}); }, 1000);

        async function update() {
            const res = await fetch("https://api.ukrainealarm.com/api/v3/alerts", { headers: {"Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9"} });
            const data = await res.json();
            const list = document.getElementById('alerts-list');
            list.innerHTML = data.length ? "" : "NO_ALERTS";
            data.forEach(a => {
                const span = document.createElement('span');
                span.className = 'alert-tag';
                span.innerText = a.regionName;
                list.appendChild(span);
            });
        }
        update(); setInterval(update, 30000);
    </script>
</body>
</html>

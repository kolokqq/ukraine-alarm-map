<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ANALYTICS_DASHBOARD</title>
    <style>
        :root { --bg: #0f1115; --card: #181c24; --text: #e0e0e0; --accent: #3b82f6; --alert: #ef4444; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; padding: 20px; gap: 20px; box-sizing: border-box; }
        
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .widget { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); border: 1px solid #2d3436; }
        
        .main-map { flex-grow: 1; border-radius: 12px; overflow: hidden; border: 1px solid #2d3436; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .status-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #2d3436; }
        .active { background: var(--alert); }
        
        h3 { margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="widget">
            <h3>Системний час</h3>
            <div id="clock" style="font-size: 24px; font-weight: bold;">00:00:00</div>
        </div>
        
        <div class="widget" style="flex-grow: 1;">
            <h3>Активні тривоги</h3>
            <div id="alerts-list" style="overflow-y:auto; max-height: 400px;"></div>
        </div>
        
        <div class="widget">
            <h3>Статус зв'язку</h3>
            <div class="status-pill active" id="net-status">ONLINE // FEED_ACTIVE</div>
        </div>
    </div>

    <main class="main-map">
        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA'); }, 1000);

        async function update() {
            try {
                const res = await fetch("https://api.ukrainealarm.com/api/v3/alerts", { headers: {"Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9"} });
                const data = await res.json();
                const list = document.getElementById('alerts-list');
                list.innerHTML = "";
                data.forEach(a => {
                    const div = document.createElement('div');
                    div.style.padding = "8px 0";
                    div.style.borderBottom = "1px solid #2d3436";
                    div.innerHTML = `<span style="color:var(--alert)">●</span> ${a.regionName}`;
                    list.appendChild(div);
                });
                document.getElementById('net-status').className = data.length ? "status-pill active" : "status-pill";
            } catch(e) {}
        }
        update(); setInterval(update, 30000);
    </script>
</body>
</html>

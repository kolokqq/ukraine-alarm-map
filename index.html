<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky-monitor.fun/">
    <meta property="og:title" content="Карта повітряних тривог України">
    <meta property="og:description" content="Карта повітряних тривог України. Моніторинг повітряних тривог та авіації.">
    <meta property="og:image" content="https://sky-monitor.fun/logo.jpg">
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        /* НОВИЙ СТИЛЬ: ТЕМНИЙ НЕОН */
        :root { 
            --accent: #00f2ff; 
            --bg: #050505; 
            --card: rgba(15, 15, 20, 0.9); 
            --red-neon: #ff003c;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* HEADER: БІЛЬШ ТЕХНІЧНИЙ ВИГЛЯД */
        .header { height: 60px; display: flex; align-items: center; padding: 0 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--accent); z-index: 10; }
        .brand { font-size: 13px; font-weight: 800; color: var(--accent); line-height: 1; text-transform: uppercase; text-shadow: 0 0 10px var(--accent); }
        #kyiv-time { margin-left: 20px; font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold; color: #fff; }

        /* ВЮПОРТ: РАМКА З ЕФЕКТОМ */
        .viewport { flex-grow: 1; margin: 10px; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid #333; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        iframe { width: 100%; height: 100%; border: none; filter: brightness(0.9) contrast(1.1); }

        /* OVERLAYS: ЧІТКІ ТА ТЕХНІЧНІ */
        #tg-overlay, #targets-overlay { position: absolute; padding: 12px; background: rgba(0,0,0,0.85); border: 1px solid #444; border-radius: 4px; z-index: 999; pointer-events: none; }
        #tg-overlay { top: 20px; left: 20px; width: 280px; border-left: 4px solid var(--accent); }
        #targets-overlay { top: 20px; right: 20px; width: 230px; border-left: 4px solid var(--red-neon); color: var(--red-neon); }

        .marquee-container { background: #000; color: var(--accent); padding: 6px 0; font-size: 11px; font-weight: 600; border-top: 1px solid #222; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* СТАТУС БЛОК */
        .status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
        .red-dot { background: var(--red-neon); color: var(--red-neon); animation: blink 0.7s infinite; }
        .green-dot { background: #00ff00; color: #00ff00; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div id="kyiv-time">00:00:00</div>
        <div class="status"><div id="dot" class="dot green-dot"></div><span id="count">0 ТРИВОГ</span></div>
    </header>

    <main class="viewport">
        <div id="tg-overlay">
            <div style="font-size:9px; color:var(--accent); text-transform:uppercase;">Оперативно:</div>
            <div id="tg-content" style="font-size: 12px; margin-top: 5px;">Завантаження...</div>
        </div>
        
        <div id="targets-overlay">
            <div style="font-size:9px; text-transform:uppercase;">Цілі в повітрі:</div>
            <div id="targets-content" style="font-size: 12px; margin-top: 5px;">Немає</div>
        </div>

        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div id="rss-feed" class="marquee-text">Система активна...</div>
    </div>
</div>

<script>
    function updateClock() { document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    async function loadTg() {
        const feedUrl = "https://rss.app/feeds/buVZUROYCKje0Fdt.xml";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const latestPost = data.items[0].title;
                document.getElementById('tg-content').innerText = latestPost;
                if (latestPost.toLowerCase().includes("груп") || latestPost.toLowerCase().includes("ціль")) {
                    document.getElementById('targets-content').innerText = latestPost;
                }
            }
        } catch(e) { document.getElementById('tg-content').innerText = "Моніторинг працює"; }
    }
    loadTg(); setInterval(loadTg, 60000);

    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            document.getElementById('rss-feed').innerText = data.length > 0 ? "🚨 ТРИВОГИ: " + data.map(a => a.regionName).join(" | ") : "✅ СТАТУС: ТРИВОГ НЕМАЄ | СЛАВА УКРАЇНІ!";
            
            document.getElementById('count').innerText = data.length + " ТРИВОГ";
            document.getElementById('dot').className = data.length > 0 ? "dot red-dot" : "dot green-dot";
        } catch(e) { document.getElementById('rss-feed').innerText = "Система активна..."; }
    }
   loadApi(); setInterval(loadApi, 1000); // Оновлення кожні 3 секунди
</script>

</body>
</html>

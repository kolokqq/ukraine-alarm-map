<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>UA_TACTICAL_EDGE // HUD v3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --hud-bg: rgba(5, 5, 5, 0.75); /* Глибоке "скло" */
            --text-main: #ffffff;         /* Чистий білий */
            --accent: #ffd700;           /* Cyber Gold акцент */
            --alert: #ff003c;             /* Тривожний червоний */
            --line: rgba(255, 255, 255, 0.1); 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Share Tech Mono', monospace; color: #fff; overflow: hidden; }
        
        /* 1. ПОВНОЕКРАННА КАРТА (НЕ ТРОГАЄМО) */
        #map-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 2. ДИЗАЙНЕРСЬКІ ОВЕРЛЕЇ (HUD) */
        .hud-module { 
            position: absolute; z-index: 999;
            background: var(--hud-bg); backdrop-filter: blur(12px); 
            border: 1px solid var(--line); 
            padding: 20px; pointer-events: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* Скошені кути для дизайну */
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        
        /* Додаємо дизайнерські лінії-акценти */
        .hud-module::before {
            content: ""; position: absolute; top: 0; left: 15px; width: calc(100% - 30px); height: 2px;
            background: var(--accent); box-shadow: 0 0 10px var(--accent);
        }

        /* Розташування */
        #top-right { top: 25px; right: 25px; text-align: right; width: 220px; }
        #bottom-left { bottom: 25px; left: 25px; width: 340px; }
        
        /* Типографіка */
        .node-title { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #aaaaaa; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .node-value { font-size: 30px; font-weight: bold; color: var(--text-main); font-family: 'Share Tech Mono', monospace; line-height: 1; }
        
        /* Список тривог */
        #alerts-content { max-height: 250px; overflow-y:auto; margin-top: 10px; }
        .alert-row { font-size: 13px; color: var(--text-main); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 7px 0; display: flex; justify-content: space-between; align-items: center; }

        /* Дизайнерський ефект "Потік Даних" (Data Stream) */
        .data-stream-activity {
            position: absolute; bottom: 10px; right: 20px;
            display: flex; gap: 3px;
        }
        .stream-bar { width: 3px; height: 10px; background: var(--accent); animation: data_flow 1s infinite ease-in-out; }
        .stream-bar:nth-child(2) { animation-delay: 0.2s; }
        .stream-bar:nth-child(3) { animation-delay: 0.4s; }

        @keyframes data_flow { 0%, 100% { transform: scaleY(0.3); opacity: 0.3; } 50% { transform: scaleY(1); opacity: 1; } }

    </style>
</head>
<body>

<div id="map-root">
    <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
</div>

<div class="hud-module" id="top-right">
    <div class="node-title">СИСТЕМНИЙ ЧАС</div>
    <div class="node-value" id="clock">00:00:00</div>
    <div class="data-stream-activity">
        <div class="stream-bar"></div>
        <div class="stream-bar"></div>
        <div class="stream-bar"></div>
    </div>
</div>

<div class="hud-module" id="bottom-left">
    <div class="node-title" style="color:var(--alert); border-bottom: 1px solid var(--alert); padding-bottom: 5px;">
        // АКТИВНІ ТРИВОГИ // AFU_NET
    </div>
    <div id="alerts-content">
        Завантаження даних...
    </div>
</div>

<script>
    // 1. Годинник
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    // 2. API Тривог (ТВОЯ ЛОГІКА, ОФОРМЛЕНА ПІД HUD EDGE)
    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            const cont = document.getElementById('alerts-content');
            cont.innerHTML = "";
            
            if(data.length === 0) {
                cont.innerHTML = "<div class='alert-row' style='color:#00ff88;'>ТРИВОГ НЕМАЄ [✓]</div>";
            } else {
                data.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'alert-row';
                    div.innerHTML = `<span>● ${a.regionName.toUpperCase()}</span><span style="color:#aaaaaa; font-size:11px;">[!]</span>`;
                    cont.appendChild(div);
                });
            }
        } catch(e) { document.getElementById('alerts-content').innerText = "Помилка завантаження"; }
    }
    loadApi(); setInterval(loadApi, 30000); // Оновлення раз на 30 сек
</script>

</body>
</html>

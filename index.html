<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Карта повітряних тривог України</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.85); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; }

        .header { height: 55px; display: flex; align-items: center; padding: 0 15px; background: var(--card); backdrop-filter: blur(15px); border-bottom: 2px solid var(--accent); z-index: 10; }
        .brand { font-size: 11px; font-weight: 900; color: var(--accent); line-height: 1.1; text-transform: uppercase; }
        
        .indicator { display: flex; align-items: center; gap: 8px; font-size: 10px; margin-left: 15px; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .green { background: #00ff00; box-shadow: 0 0 8px #00ff00; animation: blink 1.5s infinite; }
        .red { background: #ff003c; box-shadow: 0 0 8px #ff003c; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #kyiv-time { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 900; color: #ff003c; text-shadow: 0 0 8px #ff003c; }
        .viewport { flex-grow: 1; margin: 8px; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid var(--accent); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .marquee-container { background: #000; color: var(--accent); padding: 5px 0; font-size: 10px; font-weight: 800; border-bottom: 1px solid #30363d; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div class="indicator">
            <div class="dot green" id="status-dot"></div>
            <span id="alerts-count">0 ТРИВОГ</span>
        </div>
        <div class="indicator">
            <div class="dot green"></div>
            <span>SYSTEM_ACTIVE</span>
        </div>
        <div id="kyiv-time">00:00:00</div>
    </header>

    <main class="viewport">
        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div id="rss-feed" class="marquee-text">Система очікує даних...</div>
    </div>
</div>

<script>
    // Точний час
    function updateClock() { document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    // Отримання реальних даних з API
    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            
            // Кількість тривог
            const count = data.length;
            document.getElementById('alerts-count').innerText = count + " ТРИВОГ";
            document.getElementById('status-dot').className = count > 0 ? "dot red" : "dot green";
            
            // Текст внизу
            if (count > 0) {
                const list = data.map(a => `${a.regionName} (${new Date(a.startDate).toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'})})`).join(" | ");
                document.getElementById('rss-feed').innerText = "🚨 АКТИВНІ ТРИВОГИ: " + list;
            } else {
                document.getElementById('rss-feed').innerText = "✅ СТАТУС: ТРИВОГ НЕМАЄ | СЛАВА УКРАЇНІ!";
            }
        } catch(e) { 
            document.getElementById('rss-feed').innerText = "Помилка зв'язку з сервером..."; 
        }
    }
    
    loadApi(); 
    setInterval(loadApi, 10000); // Оновлення кожні 10 секунд
</script>

</body>
</html>

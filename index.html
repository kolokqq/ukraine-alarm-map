<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>UA_TACTICAL_HUD_PURE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --hud-bg: rgba(0, 0, 0, 0.5); /* Напівпрозорий чорний */
            --text-active: #ffffff;      /* Чистий білий текст */
            --alert-red: #ff3333;        /* Червоний для заголовка */
            --line: rgba(255, 255, 255, 0.2); /* Тонкі лінії */
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Share Tech Mono', monospace; color: #fff; overflow: hidden; }
        
        /* 1. ПОВНОЕКРАННА КАРТА (НЕ ТРОГАЄМО ЦВЕТ) */
        #map-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 2. HUD ОВЕРЛЕЇ (НАКЛАДЕННЯ) */
        .hud-module { 
            position: absolute; z-index: 999;
            background: var(--hud-bg); backdrop-filter: blur(10px); 
            border: 1px solid var(--line); 
            padding: 15px; pointer-events: none;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        
        /* Розташування */
        #top-right { top: 25px; right: 25px; text-align: right; }
        #bottom-left { bottom: 25px; left: 25px; width: 320px; }
        
        /* Стилістика даних */
        .node-title { font-size: 11px; color: #aaaaaa; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .node-value { font-size: 26px; font-weight: bold; color: var(--text-active); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .alert-row { font-size: 13px; color: var(--text-active); border-bottom: 1px solid #222; padding: 5px 0; }

    </style>
</head>
<body>

<div id="map-root">
    <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
</div>

<div class="hud-module" id="top-right">
    <div class="node-title">СИСТЕМНИЙ ЧАС // local_node</div>
    <div class="node-value" id="clock">00:00:00</div>
</div>

<div class="hud-module" id="bottom-left">
    <div class="node-title" style="color:var(--alert-red);">// АКТИВНІ ТРИВОГИ // regions_active</div>
    <div id="alerts-content" style="max-height: 300px; overflow-y:auto;">
        Завантаження...
    </div>
</div>

<script>
    // 1. Годинник
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    // 2. API Тривог (ТВОЯ ЛОГІКА, ОФОРМЛЕНА ПІД NEW HUD)
    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            const cont = document.getElementById('alerts-content');
            cont.innerHTML = "";
            
            if(data.length === 0) {
                cont.innerHTML = "<div class='alert-row'>ТРИВОГ НЕМАЄ [✓]</div>";
            } else {
                data.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'alert-row';
                    div.innerHTML = `<span style="color:#ff3333;">●</span> ${a.regionName.toUpperCase()}`;
                    cont.appendChild(div);
                });
            }
        } catch(e) { document.getElementById('alerts-content').innerText = "Помилка мережі"; }
    }
    loadApi(); setInterval(loadApi, 30000); // Оновлення раз на 30 сек
</script>

</body>
</html>

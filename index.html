<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky-monitor.fun/">
    <meta property="og:title" content="Карта повітряних тривог України">
    <meta property="og:description" content="Карта повітряних тривог України. Моніторинг повітряних тривог та авіації.">
    <meta property="og:image" content="https://sky-monitor.fun/logo.jpg">
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        :root { 
            --accent: #ffd700; 
            --bg: #050505; 
            --card: rgba(15, 15, 15, 0.9); 
            --red: #ff3e3e; 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Orbitron', sans-serif; color: #fff; overflow: hidden; }
        
        /* Ефект "металевої" текстури */
        body::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            z-index: 1000; pointer-events: none;
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; }

        .header { 
            height: 60px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--card); border-bottom: 2px solid var(--accent);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.1); z-index: 10;
        }
        
        .brand { font-size: 12px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        #kyiv-time { margin-left: 20px; font-size: 22px; font-weight: 900; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

        .viewport { flex-grow: 1; margin: 10px; border-radius: 5px; border: 1px solid #333; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; filter: sepia(0.2) hue-rotate(-20deg) brightness(0.9); }

        #tg-overlay, #targets-overlay { 
            position: absolute; background: rgba(0, 0, 0, 0.85); padding: 15px; 
            border: 1px solid var(--accent); border-radius: 0; z-index: 999;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px; pointer-events: none;
        }
        #tg-overlay { top: 20px; left: 20px; border-left: 4px solid var(--accent); }
        #targets-overlay { top: 20px; right: 20px; border-right: 4px solid var(--red); color: var(--red); }

        .rec-indicator { position: absolute; bottom: 40px; right: 20px; display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--accent); z-index: 999; }
        .dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .marquee-container { background: var(--accent); color: #000; padding: 6px 0; font-size: 11px; font-weight: 900; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div id="kyiv-time">00:00:00</div>
    </header>

    <main class="viewport">
        <div class="rec-indicator"><div class="dot"></div> LIVE_TACTICAL_FEED</div>
        
        <div id="tg-overlay">
            <div style="font-weight:bold; color:var(--accent);">ОПЕРАТИВНО:</div>
            <div id="tg-content">Завантаження...</div>
        </div>
        
        <div id="targets-overlay">
            <div>ЦІЛІ В ПОВІТРІ:</div>
            <div id="targets-content">Немає</div>
        </div>

        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div id="rss-feed" class="marquee-text">Система активна...</div>
    </div>
</div>

<script>
    function updateClock() { document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    async function loadTg() {
        const feedUrl = "https://rss.app/feeds/buVZUROYCKje0Fdt.xml";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const latestPost = data.items[0].title;
                document.getElementById('tg-content').innerText = latestPost;
                if (latestPost.toLowerCase().includes("груп") || latestPost.toLowerCase().includes("ціль")) {
                    document.getElementById('targets-content').innerText = latestPost;
                }
            }
        } catch(e) { document.getElementById('tg-content').innerText = "Моніторинг працює"; }
    }
    loadTg(); setInterval(loadTg, 60000);

    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            document.getElementById('rss-feed').innerText = data.length > 0 ? "🚨 ТРИВОГИ: " + data.map(a => a.regionName).join(" | ") : "✅ СТАТУС: ТРИВОГ НЕМАЄ | СЛАВА УКРАЇНІ!";
        } catch(e) { document.getElementById('rss-feed').innerText = "Система активна..."; }
    }
    loadApi(); setInterval(loadApi, 30000);
</script>

</body>
</html>

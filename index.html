<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky-monitor.fun/">
    <meta property="og:title" content="Карта повітряних тривог України">
    <meta property="og:description" content="Карта повітряних тривог України. Моніторинг повітряних тривог та авіації.">
    <meta property="og:image" content="https://sky-monitor.fun/logo.jpg">
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        /* НОВИЙ ПАТРІОТИЧНИЙ ДИЗАЙН (UKR FLAG THEME) */
        :root { 
            /* Офіційні кольори прапора України */
            --ukr-blue: #0057B7; 
            --ukr-yellow: #FFD700;
            --bg: #030405; 
            --panel: rgba(10, 12, 15, 0.95); 
            --red: #ff003c; 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Roboto Condensed', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* HEADER: СИНІЙ КОЛІР ПРАПОРА */
        .header { height: 60px; display: flex; align-items: center; padding: 0 20px; background: var(--ukr-blue); backdrop-filter: blur(5px); border-bottom: 2px solid var(--ukr-yellow); z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .brand { font-size: 16px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        #kyiv-time { margin-left: 25px; font-family: 'Courier New', monospace; font-size: 24px; font-weight: bold; color: var(--ukr-yellow); text-shadow: 0 0 10px rgba(255,215,0,0.7); }

        /* VIEWPORT */
        .viewport { flex-grow: 1; margin: 10px; border-radius: 4px; overflow: hidden; background: #000; border: 1px solid #333; position: relative; }
        iframe { width: 100%; height: 100%; border: none; filter: sepia(0.1) brightness(0.9); }

        /* OVERLAYS: АДАПТОВАНІ КОЛЬОРИ */
        #tg-overlay { position: absolute; top: 20px; left: 20px; width: 280px; background: var(--panel); color: #fff; padding: 15px; border: 1px solid var(--ukr-blue); border-radius: 4px; z-index: 999; pointer-events: none; }
        #targets-overlay { position: absolute; top: 20px; right: 20px; width: 230px; background: var(--panel); border: 1px solid var(--red); color: var(--red); padding: 15px; border-radius: 4px; z-index: 998; font-weight: bold; pointer-events: none; }

        /* MARQUEE: ЖОВТИЙ КОЛІР ПРАПОРА */
        .marquee-container { background: var(--ukr-yellow); color: #000; padding: 10px 0; font-size: 12px; font-weight: 900; border-top: 2px solid var(--ukr-blue); overflow: hidden; white-space: nowrap; box-shadow: 0 -4px 15px rgba(0,0,0,0.3); }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; text-transform: uppercase; letter-spacing: 1px; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* СТАТУС БЛОК В ХЕДЕРІ */
        .status-block { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 11px; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .red-dot { background: var(--red); box-shadow: 0 0 10px var(--red); animation: blink 0.7s infinite; }
        .green-dot { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div id="kyiv-time">00:00:00</div>
        <div class="status-block"><div id="dot" class="dot green-dot"></div><span id="alerts-count">0 ТРИВОГ</span></div>
    </header>

    <main class="viewport">
        <div id="tg-overlay">
            <div style="font-weight:bold; color:var(--ukr-yellow); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">ОПЕРАТИВНО:

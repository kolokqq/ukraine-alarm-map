<!DOCTYPE html>
<html lang="uk">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        body { margin: 0; background: transparent; font-family: 'Orbitron', sans-serif; }

        .hud-container {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 450px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(20, 0, 0, 0.9));
            border: 2px solid #ff0000;
            padding: 20px;
            color: #ff3333;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
        }

        .hud-header {
            font-size: 24px;
            font-weight: 900;
            border-bottom: 2px solid #ff3333;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .status-blink {
            animation: blink 1s infinite;
            color: #fff;
            background: #ff0000;
            padding: 2px 8px;
        }

        .data-row { margin-top: 15px; font-size: 18px; }

        .glitch { animation: glitch 2s infinite; }

        @keyframes blink { 50% { opacity: 0; } }
        
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-header">
            SYSTEM ALERT <span class="status-blink">ACTIVE</span>
        </div>
        <div class="data-row">
            AREA: ZAPORIZHZHIA REGION
        </div>
        <div class="data-row glitch">
            THREAT LEVEL: CRITICAL
        </div>
        <div style="margin-top: 20px; font-size: 12px; opacity: 0.7;">
            EN0T1K_UA_PROTOCOL // 26.04.2026
        </div>
    </div>

</body>
</html>

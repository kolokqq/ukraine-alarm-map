<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>COMMAND_CENTER // V.2026</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ffffff; --border: #333333; --alert: #ff0000; }
        body { margin: 0; background: var(--bg); color: var(--accent); font-family: 'Segoe UI', monospace; overflow: hidden; }
        
        /* СІТКА ІНТЕРФЕЙСУ */
        .wrapper { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 80px 1fr 40px; height: 100vh; gap: 2px; background: var(--border); }

        .panel { background: var(--bg); padding: 15px; overflow: hidden; position: relative; }
        
        /* HEADER */
        .header { grid-column: 1 / 3; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 5px; }

        /* LIVE FEED LIST */
        .threat-list { grid-row: 2; overflow-y: auto; }
        .threat-item { padding: 8px; border-bottom: 1px solid #222; font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; }
        .threat-item.on { color: var(--alert); }

        /* MAP AREA */
        .map-area { grid-column: 2; grid-row: 2; border-left: 2px solid var(--border); }
        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) contrast(1.2) brightness(0.8); }

        /* FOOTER */
        .footer { grid-column: 1 / 3; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 11px; color: #666; }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="panel header">
        <div class="logo">COMMAND_CENTER // UA</div>
        <div id="sys-time">00:00:00</div>
    </header>

    <aside class="panel threat-list">
        <h3 style="font-size:11px; color:#555;">ACTIVE THREATS // REGIONS</h3>
        <div id="alerts-container"></div>
    </aside>

    <main class="panel map-area">
        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <footer class="panel footer">
        <div>SYSTEM STATUS: ONLINE // GFX_SYNC: OK</div>
        <div id="rss-feed">LOADING RSS...</div>
    </footer>
</div>

<script>
    // 1. Годинник
    setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString('uk-UA'); }, 1000);

    // 2. Логіка оновлення тривог
    async function update() {
        try {
            const res = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: {"Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9"}
            });
            const data = await res.json();
            const cont = document.getElementById('alerts-container');
            cont.innerHTML = "";
            
            if(data.length === 0) cont.innerHTML = "<div class='threat-item'>NO THREATS</div>";
            
            data.forEach(a => {
                const div = document.createElement('div');
                div.className = 'threat-item on';
                div.innerHTML = `<span>${a.regionName.toUpperCase()}</span><span>[!]</span>`;
                cont.appendChild(div);
            });
            
            document.getElementById('rss-feed').innerText = data.length > 0 ? "WARNING: ALERTS IN PROGRESS" : "STATUS: NORMAL";
        } catch(e) {}
    }
    update(); setInterval(update, 20000);
</script>
</body>
</html>

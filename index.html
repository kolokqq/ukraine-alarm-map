<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Alert Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --danger-color: #ff3e3e;
            --bg-color: rgba(15, 17, 26, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: transparent; /* Для прозорого фону в OBS */
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        .alert-box {
            width: 400px;
            background: var(--bg-color);
            border-left: 5px solid var(--danger-color);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 62, 62, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: pulse-border 2s infinite ease-in-out;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--danger-color);
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .content {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
        }

        .footer {
            font-size: 14px;
            color: #a0a0a0;
            border-top: 1px solid var(--glass-border);
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Анімації */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 15px rgba(255, 62, 62, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 62, 62, 0.6); }
            100% { box-shadow: 0 0 15px rgba(255, 62, 62, 0.3); }
        }

        .icon {
            width: 30px;
            height: 30px;
            background: var(--danger-color);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }
    </style>
</head>
<body>

    <div class="alert-box">
        <div class="header">
            <div class="icon"></div>
            Повітряна Тривога
        </div>
        <div class="content">
            Запорізька область
        </div>
        <div class="footer">
            <span>Статус: АКТИВНО</span>
            <span>26.04.2026</span>
        </div>
    </div>

</body>
</html>

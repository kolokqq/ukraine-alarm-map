<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky-monitor.fun/">
    <meta property="og:title" content="Карта повітряних тривог України">
    <meta property="og:description" content="Карта повітряних тривог України. Моніторинг повітряних тривог та авіації.">
    <meta property="og:image" content="https://sky-monitor.fun/logo.jpg">
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.85); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; }

        .viewport { flex-grow: 1; margin: 8px; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid var(--accent); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- ЛЕГЕНДА З ВИПРАВЛЕНИМИ ІКОНКАМИ --- */
        .legend-block { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            background: rgba(0, 0, 0, 0.85); 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--accent); 
            z-index: 1000; 
            font-size: 14px; 
            pointer-events: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; }
        .legend-icon { width: 20px; height: 20px; margin-right: 10px; }
        
        /* Спеціальні відступи для похилих ліній, щоб вони були по центру */
        .legend-icon.slanted { transform: translateY(1px); }

        @media (max-width: 600px) { 
            .legend-block { bottom: 10px; right: 10px; padding: 6px; font-size: 10px; } 
            .legend-icon { width: 12px; height: 12px; margin-right: 5px; } 
        }

        #tg-overlay { position: absolute; top: 20px; left: 20px; width: 300px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--accent); z-index: 999; pointer-events: none; }
        #targets-overlay { position: absolute; top: 20px; right: 20px; width: 250px; background: rgba(255, 0, 0, 0.2); border: 1px solid red; color: #ff4d4d; padding: 10px; border-radius: 10px; z-index: 998; font-weight: bold; pointer-events: none; }

        .marquee-container { background: #000; color: var(--accent); padding: 5px 0; font-size: 10px; font-weight: 800; border-bottom: 1px solid #30363d; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="wrapper">
    <main class="viewport">
        <div class="legend-block">
            <div style="text-align:center; margin-bottom:10px; font-weight:bold;">ЛЕГЕНДА ЦІЛЕЙ</div>
            
            <div class="legend-item">
                <svg class="legend-icon slanted" viewBox="0 0 24 24"><path d="M4 18L18 4M4 14L14 4" stroke="#00FF00" stroke-width="2.5" stroke-linecap="round"/></svg>
                <div>Крилаті ракети</div>
            </div>
            
            <div class="legend-item">
                <svg class="legend-icon" viewBox="0 0 24 24"><polygon points="12,4 2,20 22,20" fill="#FFFF00"/></svg>
                <div>Аеробалістичні</div>
            </div>
            
            <div class="legend-item">
                <svg class="legend-icon" viewBox="0 0 24 24"><polygon points="12,4 2,20 22,20" fill="#FF0000"/></svg>
                <div>Ударні БпЛА</div>
            </div>
            
            <div class="legend-item">
                <svg class="legend-icon slanted" viewBox="0 0 24 24"><path d="M4 20L20 4" stroke="#FF00FF" stroke-width="3" stroke-linecap="round"/></svg>
                <div>Балістичні</div>
            </div>
            
            <div class="legend-item">
                <svg class="legend-icon" viewBox="0 0 24 24"><path d="M4 12L20 12" stroke="#0000FF" stroke-width="3.5" stroke-linecap="round"/></svg>
                <div>Х-101</div>
            </div>
        </div>

        <div id="tg-overlay">
            <div style="font-weight:bold; color:var(--accent);">ОПЕРАТИВНО:</div>
            <div id="tg-content">Завантаження...</div>
        </div>
        
        <div id="targets-overlay">
            <div>ЦІЛІ В ПОВІТРІ:</div>
            <div id="targets-content">Немає</div>
        </div>

        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div id="rss-feed" class="marquee-text">Система активна...</div>
    </div>
</div>

<script>
    /* КОД НЕ ЗМІНЮВАВСЯ */
    async function loadTg() {
        const feedUrl = "https://rss.app/feeds/buVZUROYCKje0Fdt.xml";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const latestPost = data.items[0].title;
                document.getElementById('tg-content').innerText = latestPost;
                if (latestPost.toLowerCase().includes("груп") || latestPost.toLowerCase().includes("ціль")) {
                    document.getElementById('targets-content').innerText = latestPost;
                }
            }
        } catch(e) { document.getElementById('tg-content').innerText = "Моніторинг працює"; }
    }
    loadTg(); setInterval(loadTg, 60000);

    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            document.getElementById('rss-feed').innerText = data.length > 0 ? "🚨 ТРИВОГИ: " + data.map(a => a.regionName).join(" | ") : "✅ СТАТУС: ТРИВОГ НЕМАЄ | СЛАВА УКРАЇНІ!";
        } catch(e) { document.getElementById('rss-feed').innerText = "Система активна..."; }
    }
    loadApi(); setInterval(loadApi, 30000);
</script>

</body>
</html>

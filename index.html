<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>UA_MONITOR // HELLFIRE_PROTOCOL // ACTIVE</title>
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        :root { 
            --fire-core: #ff4500;   /* Серце вогню */
            --fire-glow: #8b0000;   /* Кривавий відблиск */
            --bg: #000; 
            --card: rgba(10, 0, 0, 0.85); /* Темно-червоний для оверлеїв */
            --red: #ff0000; 
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Impact', sans-serif; color: #fff; overflow: hidden; }
        
        /* КАНВАС ДЛЯ АНІМАЦІЇ ВОГНЮ */
        #fireCanvas {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; /* Вогонь займає 60% екрана знизу */
            z-index: 1; /* Вогонь ПОЗАДУ оверлеїв, але ПОВЕРХ мапи */
            pointer-events: none; /* Щоб вогонь не заважав клікати */
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 2; /* Усі елементи поверх вогню */ }

        /* HEADER: Мерехтливий, "гарячий" */
        .header { 
            height: 60px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--card); border-bottom: 3px solid var(--fire-core);
            backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(255, 69, 0, 0.5); z-index: 10;
            animation: flicker 0.15s infinite; /* Ефект мерехтіння вогню */
        }
        
        .brand { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 3px; line-height: 1; text-shadow: 0 0 10px var(--fire-core); }
        #kyiv-time { margin-left: 20px; font-size: 30px; font-weight: 900; color: var(--red); text-shadow: 0 0 15px var(--red); }

        .viewport { flex-grow: 1; margin: 10px; border-radius: 5px; border: 2px solid var(--fire-core); position: relative; background: #000; overflow: hidden; box-shadow: inset 0 0 30px var(--fire-glow); }
        
        /* Iframe: Карта з ефектом "пекельних креслень" */
        iframe { 
            width: 100%; height: 100%; border: none; 
            filter: sepia(1) hue-rotate(-50deg) contrast(1.5) brightness(0.8); /* Перетворює синю карту на вогняну */
        }

        /* ОВЕРЛЕЇ: "Розпечені", з ефектом зрізів */
        #tg-overlay, #targets-overlay { 
            position: absolute; background: rgba(10, 0, 0, 0.9); padding: 18px; 
            border: 1px solid var(--fire-core); border-radius: 0; z-index: 999;
            font-size: 12px; text-transform: uppercase; letter-spacing: 2px; pointer-events: none;
            backdrop-filter: blur(10px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.3);
            animation: heat_haze 3s infinite ease-in-out; /* Ефект "марева" від жару */
        }
        #tg-overlay { top: 25px; left: 25px; width: 340px; border-left: 5px solid var(--fire-core); }
        #targets-overlay { top: 25px; right: 25px; width: 300px; border-right: 5px solid var(--red); color: var(--red); border-color: var(--red); }

        /* БІГУЧИЙ РЯДОК: "Палаючий" */
        .marquee-container { background: var(--card); color: #fff; padding: 7px 0; font-size: 13px; font-weight: 900; overflow: hidden; white-space: nowrap; border-top: 1px solid var(--fire-core); }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px #fff; }
        
        /* АНІМАЦІЇ */
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.9; } }
        @keyframes heat_haze { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    </style>
</head>
<body>

<canvas id="fireCanvas"></canvas>

<div class="wrapper">
    <header class="header">
        <div class="brand">UA_MONITOR // HELLFIRE_PROTOCOL<br>ACTIVE // MONITORING</div>
        <div id="kyiv-time">00:00:00</div>
    </header>

    <main class="viewport">
        
        <div id="tg-overlay">
            <div style="font-weight:bold; color:var(--fire-core); letter-spacing: 2.5px; border-bottom: 1px solid var(--fire-core); padding-bottom: 5px; margin-bottom: 12px; font-family: 'Orbitron', sans-serif;">LIVE INTEL // OP_UPDATE</div>
            <div id="tg-content">Завантаження даних системи...</div>
        </div>
        
        <div id="targets-overlay">
            <div style="font-weight:bold; letter-spacing: 2.5px; font-family: 'Orbitron', sans-serif;">THREAT_DETECTION // HIGH</div>
            <div id="targets-content">ЦІЛІ НЕ ВИЯВЛЕНО</div>
        </div>

        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div id="rss-feed" class="marquee-text">Система активна... СЛАВА УКРАЇНІ! ГЕРОЯМ СЛАВА!</div>
    </div>
</div>

<script>
    // --- АНІМАЦІЯ ВОГНЮ (CANVAS) ---
    const canvas = document.getElementById('fireCanvas');
    const ctx = canvas.getContext('2d');

    // Налаштування канвасу під розмір екрана
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const particles = [];
    const particleCount = 250; // Кількість частинок вогню

    // Клас частинки вогню
    class Particle {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 20; // Стартують знизу екрана
            this.size = Math.random() * 25 + 10;
            this.speedY = Math.random() * -3 - 1; // Швидкість підйому
            this.color = `rgba(${255}, ${Math.random() * 69}, 0, ${Math.random() * 0.5 + 0.1})`; // Помаранчево-червоний
            this.life = Math.random() * 100;
        }

        update() {
            this.y += this.speedY;
            if (this.size > 0.2) this.size -= 0.15;
            this.life -= 1;
            if (this.life < 0) {
                this.reset();
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Ініціалізація
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }

    // Цикл анімації
    function animateFire() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Очищаємо канвас

        // Додаємо ефект світіння та розмиття
        ctx.globalCompositeOperation = 'lighter'; // Частинки світяться, коли накладаються
        ctx.filter = 'blur(5px)'; // Додає реалістичне розмиття полум'я

        particles.forEach(p => {
            p.update();
            p.draw();
        });

        // Повертаємо стандартний режим
        ctx.globalCompositeOperation = 'source-over';
        ctx.filter = 'none';

        requestAnimationFrame(animateFire);
    }
    animateFire();


    // --- ТВОЯ ЛОГІКА СКРИПТІВ (ЗАЛИШИЛАСЯ БЕЗ ЗМІН) ---
    function updateClock() { document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    async function loadTg() {
        const feedUrl = "https://rss.app/feeds/buVZUROYCKje0Fdt.xml";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const latestPost = data.items[0].title;
                document.getElementById('tg-content').innerText = latestPost;
                if (latestPost.toLowerCase().includes("груп") || latestPost.toLowerCase().includes("ціль")) {
                    document.getElementById('targets-content').innerText = latestPost;
                }
            }
        } catch(e) { document.getElementById('tg-content').innerText = "Система моніторингу активна"; }
    }
    loadTg(); setInterval(loadTg, 60000);

    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            document.getElementById('rss-feed').innerText = data.length > 0 ? "🚨 ТРИВОГИ: " + data.map(a => a.regionName).join(" | ") + " | СЛАВА ЗСУ!" : "✅ СТАТУС: ТРИВОГ НЕМАЄ | СЛАВА УКРАЇНІ!";
        } catch(e) { document.getElementById('rss-feed').innerText = "Система активна... AFU // TACTICAL NET"; }
    }
    loadApi(); setInterval(loadApi, 30000);
</script>

</body>
</html>

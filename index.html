<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <meta property="og:type" content="website">

    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        :root { --blue: #0057B7; --yellow: #FFD700; --bg: #0d1117; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* ЕФЕКТ СВІТІННЯ СТОРІНКИ */
        @keyframes glow { 0%, 100% { box-shadow: inset 0 0 50px rgba(0, 87, 183, 0.2); } 50% { box-shadow: inset 0 0 100px rgba(255, 215, 0, 0.1); } }
        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; animation: glow 5s infinite; }

        /* HEADER */
        .header { height: 55px; display: flex; align-items: center; padding: 0 15px; background: var(--blue); border-bottom: 3px solid var(--yellow); z-index: 10; }
        
        /* АНІМОВАНИЙ ПРАПОР */
        .flag-box { width: 30px; height: 20px; background: linear-gradient(var(--blue) 50%, var(--yellow) 50%); margin-right: 15px; border: 1px solid #fff; border-radius: 2px; animation: wave 2s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.9); } }

        .brand { font-size: 11px; font-weight: 900; color: #fff; line-height: 1.1; text-transform: uppercase; }
        #kyiv-time { margin-left: 15px; font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 900; color: var(--yellow); text-shadow: 0 0 8px var(--yellow); }

        /* СТИЛЬ ДЛЯ «СЛАВА УКРАЇНІ» */
        .glory-text {
            margin-left: auto; /* Притискає напис до правого краю */
            font-size: 18px; 
            font-weight: 800; 
            color: var(--yellow); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px var(--yellow), 0 0 20px var(--yellow); /* Подвійне світіння */
        }

        .viewport { flex-grow: 1; margin: 8px; border-radius: 15px; overflow: hidden; background: #000; border: 2px solid var(--blue); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        #tg-overlay { position: absolute; top: 20px; left: 20px; width: 300px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--blue); z-index: 999; pointer-events: none; }
        #targets-overlay { position: absolute; top: 20px; right: 20px; width: 250px; background: rgba(255, 215, 0, 0.2); border: 1px solid var(--yellow); color: var(--yellow); padding: 10px; border-radius: 10px; z-index: 998; font-weight: bold; pointer-events: none; }

        .marquee-container { background: var(--yellow); color: #000; padding: 5px 0; font-size: 10px; font-weight: 800; border-top: 3px solid var(--blue); overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="wrapper">

    </header>

    function updateClock() { document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    async function loadTg() {
        const feedUrl = "https://rss.app/feeds/buVZUROYCKje0Fdt.xml";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const latestPost = data.items[0].title;
                document.getElementById('tg-content').innerText = latestPost;
                if (latestPost.toLowerCase().includes("груп") || latestPost.toLowerCase().includes("ціль")) {
                    document.getElementById('targets-content').innerText = latestPost;
                }
            }
        } catch(e) { document.getElementById('tg-content').innerText = "Моніторинг працює"; }
    }

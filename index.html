<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.85); --red: #ff003c; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        /* Ефект сканування CRT */
        body::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; }

        .header { height: 55px; display: flex; align-items: center; padding: 0 15px; background: var(--card); backdrop-filter: blur(15px); border-bottom: 2px solid var(--accent); z-index: 10; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .brand { font-size: 11px; font-weight: 900; color: var(--accent); line-height: 1.1; text-transform: uppercase; }
        #kyiv-time { margin-left: 15px; font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 900; color: var(--red); text-shadow: 0 0 8px var(--red); }

        .viewport { flex-grow: 1; margin: 8px; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid var(--accent); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Оновлені оверлеї */
        #tg-overlay, #targets-overlay { 
            position: absolute; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 15px; border-radius: 10px; 
            border: 1px solid var(--accent); z-index: 999; pointer-events: none; backdrop-filter: blur(10px);
        }
        #tg-overlay { top: 20px; left: 20px; width: 300px; }
        #targets-overlay { top: 20px; right: 20px; width: 250px; border-color: var(--red); color: var(--red); }

        /* Індикатор REC */
        .rec-indicator { position: absolute; bottom: 45px; left: 20px; display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--red); z-index: 999; font-weight: 800; }
        .dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .marquee-container { background: #000; color: var(--accent); padding: 5px 0; font-size: 10px; font-weight: 800; border-bottom: 1px solid #30363d; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div id="kyiv-time">00:00:00</div>
    </header>

    <main class="viewport">
        <div class="rec-indicator"><div class="dot"></div> LIVE_TACTICAL_FEED</div>
        
        <div id="tg-overlay">
            <div style="font-weight:bold; color:var(--accent);">ОПЕРАТИВНО:</div>
            <div id="tg-content">Завантаження...</div>
        </div>
        
        <div id="targets-overlay">
            <div>ЦІЛІ В ПОВІТРІ:</div>
            <div id="targets-content">Немає</div>
        </div>

        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div id="rss-feed" class="marquee-text">Система активна...</div>
    </div>
</div>

<script>
    function updateClock() { document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false }); }
    setInterval(updateClock, 1000); updateClock();

    async function loadTg() {
        const feedUrl = "https://rss.app/feeds/buVZUROYCKje0Fdt.xml";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const latestPost = data.items[0].title;
                document.getElementById('tg-content').innerText = latestPost;
                if (latestPost.toLowerCase().includes("груп") || latestPost.toLowerCase().includes("ціль")) {
                    document.getElementById('targets-content').innerText = latestPost;
                }
            }
        } catch(e) { document.getElementById('tg-content').innerText = "Моніторинг працює"; }
    }
    loadTg(); setInterval(loadTg, 60000);

    async function loadApi() {
        try {
            const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                headers: { "Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9", "Accept": "application/json" }
            });
            const data = await response.json();
            document.getElementById('rss-feed').innerText = data.length > 0 ? "🚨 ТРИВОГИ: " + data.map(a => a.regionName).join(" | ") : "✅ СТАТУС: ТРИВОГ НЕМАЄ | СЛАВА УКРАЇНІ!";
        } catch(e) { document.getElementById('rss-feed').innerText = "Система активна..."; }
    }
    loadApi(); setInterval(loadApi, 30000);
</script>

</body>
</html>

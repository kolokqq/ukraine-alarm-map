<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DARK_OPS_MONITOR</title>
    <style>
        :root { --line: #333; --text: #fff; --alert: #ff3333; }
        
        body { margin: 0; background: #050505; color: var(--text); font-family: 'Roboto Condensed', sans-serif; overflow: hidden; }

        /* Мінімалістична сітка */
        .grid-bg { position: fixed; inset: 0; background-image: radial-gradient(var(--line) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.2; pointer-events: none; }

        .layout { display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 1fr 60px; height: 100vh; padding: 20px; gap: 20px; box-sizing: border-box; }

        /* Картка */
        .card { border: 1px solid var(--line); padding: 20px; background: rgba(10,10,10,0.8); backdrop-filter: blur(5px); }
        h2 { font-size: 10px; letter-spacing: 4px; color: #888; margin-top: 0; }

        .map-wrapper { grid-column: 2; grid-row: 1 / 3; border: 1px solid var(--line); position: relative; }
        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) brightness(0.7) invert(0.1); }

        .alert-row { font-size: 14px; padding: 10px 0; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .alert-row.active { color: var(--alert); font-weight: bold; }

        .footer { grid-column: 1; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--line); padding: 0 20px; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="layout">
        <div class="card">
            <h2>OPERATIONAL STATUS</h2>
            <div id="alerts-container"></div>
        </div>
        <div class="map-wrapper">
            <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
        </div>
        <div class="footer">
            <div id="clock">00:00:00</div>
            <div>STATUS: STEALTH</div>
        </div>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA'); }, 1000);

        async function update() {
            const res = await fetch("https://api.ukrainealarm.com/api/v3/alerts", { headers: {"Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9"} });
            const data = await res.json();
            const cont = document.getElementById('alerts-container');
            cont.innerHTML = "";
            data.forEach(a => {
                const row = document.createElement('div');
                row.className = 'alert-row active';
                row.innerHTML = `<span>${a.regionName.toUpperCase()}</span><span>[!]</span>`;
                cont.appendChild(row);
            });
        }
        update(); setInterval(update, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>COMMAND_OVERLAY_PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Orbitron', sans-serif; color: #fff; overflow: hidden; }

        /* Карта залишається як є */
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ВЕЛИКИЙ ДИЗАЙНЕРСЬКИЙ HUD */
        .hud-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; padding: 30px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        /* ДИЗАЙНЕРСЬКІ РАМКИ */
        .box { border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); padding: 20px; pointer-events: auto; position: relative; }
        .box::before { content: ""; position: absolute; top: -5px; left: -5px; width: 20px; height: 20px; border-top: 2px solid #fff; border-left: 2px solid #fff; }
        .box::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 20px; height: 20px; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }

        /* КОНТЕНТ */
        .time-big { font-size: 48px; font-weight: 900; color: #fff; }
        .alert-item { font-family: 'Roboto Condensed'; font-size: 16px; border-bottom: 1px solid rgba(255,0,0,0.3); padding: 5px 0; color: #ff3333; text-transform: uppercase; }

        /* ДЕКОРАТИВНІ ЕЛЕМЕНТИ */
        .corner-marker { position: absolute; width: 100px; height: 100px; border: 1px solid rgba(255,255,255,0.1); opacity: 0.3; }
    </style>
</head>
<body>

    <div id="map"><iframe src="https://alerts.in.ua/?theme=dark"></iframe></div>

    <div class="hud-layer">
        <div class="box" style="justify-self: start; align-self: start; width: 250px;">
            <div style="font-size: 10px; letter-spacing: 3px; color: #aaa;">SYSTEM LOCAL TIME</div>
            <div class="time-big" id="clock">00:00</div>
        </div>

        <div class="box" style="justify-self: end; align-self: start; width: 300px; height: 400px; overflow: hidden;">
            <div style="font-size: 10px; letter-spacing: 3px; color: #aaa; margin-bottom: 10px;">ACTIVE THREAT ZONES</div>
            <div id="alerts"></div>
        </div>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'}); }, 1000);

        async function update() {
            const res = await fetch("https://api.ukrainealarm.com/api/v3/alerts", { headers: {"Authorization": "Bearer eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9"} });
            const data = await res.json();
            const list = document.getElementById('alerts');
            list.innerHTML = data.length ? "" : "<div style='color:#0f0'>STATUS: CLEAR</div>";
            data.forEach(a => {
                const div = document.createElement('div');
                div.className = 'alert-item';
                div.innerText = `● ${a.regionName}`;
                list.appendChild(div);
            });
        }
        update(); setInterval(update, 20000);
    </script>
</body>
</html>
